# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "b5895378caf752dd418a8761f311266d"
name = "Product-review"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,write_metaobjects,write_metaobject_definitions"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[app_proxy]
url = "https://217f-202-47-41-0.ngrok-free.app/api/reviews"
subpath = "product-reviews" 
prefix = "apps"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"


[metaobjects.app.product_review]
name = "Product Review"
access.admin = "merchant_read_write"
access.storefront = "public_read"


[metaobjects.app.product_review.fields.product_id]
name = "Product Id"
type = "single_line_text_field"

[metaobjects.app.product_review.fields.author]
name = "Author"
type = "single_line_text_field"

[metaobjects.app.product_review.fields.review_text]
name= "review Text"
type = "multi_line_text_field"

[metaobjects.app.product_review.fields.rating]
name = "Rating"
type = "number_integer"

[metaobjects.app.product_review.fields.date]
name = "Date"
type= "single_line_text_field"
